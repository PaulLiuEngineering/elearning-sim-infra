name: Terraform

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/terraform.yml"
      - "terraform/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/terraform.yml"
      - "terraform/**"

permissions:
  contents: read
  id-token: write

env:
  TF_IN_AUTOMATION: true

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-stacks:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
      stacks: ${{ steps.detect.outputs.stacks }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed Terraform stacks
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA="$(git rev-list --max-parents=0 HEAD --reverse | awk 'NR==1 { print; exit }')"
          fi

          mapfile -t changed_files < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- terraform .github/workflows/terraform.yml)
          declare -A stacks=()

          is_stack_root() {
            local dir="$1"
            [[ -f "$dir/backend.tf" || -f "$dir/providers.tf" ]]
          }

          add_stack_root_from_path() {
            local path="$1"
            local dir

            dir="$(dirname "$path")"

            while [[ "$dir" == terraform/live/* ]]; do
              if is_stack_root "$dir"; then
                stacks["$dir"]=1
                return 0
              fi

              dir="$(dirname "$dir")"
            done
          }

          add_module_consumers() {
            local module_dir="$1"
            local module_name

            module_name="$(basename "$module_dir")"

            while IFS= read -r file; do
              [[ -z "$file" ]] && continue
              add_stack_root_from_path "$file"
            done < <(git grep -l "modules/${module_name}" -- terraform/live || true)
          }

          for file in "${changed_files[@]}"; do
            [[ -z "$file" ]] && continue

            if [[ "$file" == terraform/live/* ]]; then
              add_stack_root_from_path "$file"
            elif [[ "$file" == terraform/modules/* ]]; then
              module_dir="$(printf '%s' "$file" | cut -d/ -f1-3)"
              add_module_consumers "$module_dir"
            fi
          done

          if [[ "${#stacks[@]}" -eq 0 ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "stacks=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t sorted_stacks < <(printf '%s\n' "${!stacks[@]}" | sort)

          STACKS_JSON="$(printf '%s\n' "${sorted_stacks[@]}" | python3 -c '
          import json
          import os
          import sys

          stacks = []
          for line in sys.stdin:
              stack_dir = line.strip()
              if not stack_dir:
                  continue

              metadata_path = os.path.join(stack_dir, "stack-metadata.json")
              with open(metadata_path, "r", encoding="utf-8") as metadata_file:
                  metadata = json.load(metadata_file)

              stacks.append(
                  {
                      "stack_dir": stack_dir,
                      "provider": metadata["provider"],
                      "region": metadata["region"],
                      "github_environment": metadata["github_environment"],
                      "role_arn": metadata["role_arn"],
                  }
              )

          print(json.dumps(stacks, separators=(",", ":")))
          ')"

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          printf 'stacks=%s\n' "$STACKS_JSON" >> "$GITHUB_OUTPUT"

  fmt:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive

  validate-and-plan:
    if: github.event_name == 'pull_request' && needs.detect-stacks.outputs.has_changes == 'true'
    needs:
      - detect-stacks
      - fmt
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stack: ${{ fromJson(needs.detect-stacks.outputs.stacks) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        if: matrix.stack.provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ matrix.stack.region }}
          role-to-assume: ${{ matrix.stack.role_arn }}

      - name: Terraform init
        working-directory: ${{ matrix.stack.stack_dir }}
        run: terraform init -input=false

      - name: Terraform validate
        working-directory: ${{ matrix.stack.stack_dir }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ matrix.stack.stack_dir }}
        run: terraform plan -input=false -no-color

  apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-stacks.outputs.has_changes == 'true'
    needs:
      - detect-stacks
    runs-on: ubuntu-latest
    environment: ${{ matrix.stack.github_environment }}
    strategy:
      fail-fast: false
      matrix:
        stack: ${{ fromJson(needs.detect-stacks.outputs.stacks) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        if: matrix.stack.provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ matrix.stack.region }}
          role-to-assume: ${{ matrix.stack.role_arn }}

      - name: Terraform init
        working-directory: ${{ matrix.stack.stack_dir }}
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: ${{ matrix.stack.stack_dir }}
        run: terraform apply -input=false -auto-approve -no-color
