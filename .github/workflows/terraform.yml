name: Terraform

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/terraform.yml"
      - "terraform/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/terraform.yml"
      - "terraform/**"
  workflow_dispatch:
    inputs:
      stack_dir:
        description: "Optional Terragrunt stack directory under terraform/live."
        required: false
        type: string
      run_apply:
        description: "Run apply during manual execution."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  TF_IN_AUTOMATION: true
  TG_VERSION: "1.0.0"

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-stacks:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
      groups: ${{ steps.detect.outputs.groups }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed Terragrunt stacks
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          MANUAL_STACK_DIR="${{ github.event.inputs.stack_dir || '' }}"
          declare -A stacks=()

          is_stack_root() {
            local dir="$1"
            [[ -f "$dir/terragrunt.hcl" && -f "$dir/stack-metadata.json" ]]
          }

          add_stack_root_from_path() {
            local path="$1"
            local dir

            dir="$(dirname "$path")"

            while [[ "$dir" == terraform/live/* ]]; do
              if is_stack_root "$dir"; then
                stacks["$dir"]=1
                return 0
              fi

              dir="$(dirname "$dir")"
            done
          }

          add_module_consumers() {
            local module_dir="$1"
            local module_name

            module_name="$(basename "$module_dir")"

            while IFS= read -r file; do
              [[ -z "$file" ]] && continue
              add_stack_root_from_path "$file"
            done < <(git grep -l "modules/${module_name}" -- terraform/live || true)
          }

          if [[ -n "$MANUAL_STACK_DIR" ]]; then
            if ! is_stack_root "$MANUAL_STACK_DIR"; then
              echo "Manual stack_dir '$MANUAL_STACK_DIR' is not a valid Terragrunt stack root." >&2
              exit 1
            fi

            stacks["$MANUAL_STACK_DIR"]=1
          else
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              BASE_SHA="${{ github.event.pull_request.base.sha }}"
              HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            else
              BASE_SHA="${{ github.event.before }}"
              HEAD_SHA="${{ github.sha }}"
            fi

            if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
              BASE_SHA="$(git rev-list --max-parents=0 HEAD --reverse | awk 'NR==1 { print; exit }')"
            fi

            mapfile -t changed_files < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- terraform .github/workflows/terraform.yml)

            for file in "${changed_files[@]}"; do
              [[ -z "$file" ]] && continue

              if [[ "$file" == terraform/live/* ]]; then
                add_stack_root_from_path "$file"
              elif [[ "$file" == terraform/modules/* ]]; then
                module_dir="$(printf '%s' "$file" | cut -d/ -f1-3)"
                add_module_consumers "$module_dir"
              fi
            done
          fi

          if [[ "${#stacks[@]}" -eq 0 ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "groups=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t sorted_stacks < <(printf '%s\n' "${!stacks[@]}" | sort)

          GROUPS_JSON="$(printf '%s\n' "${sorted_stacks[@]}" | python3 -c '
          import json
          import os
          import sys

          groups = {}

          for line in sys.stdin:
              stack_dir = line.strip()
              if not stack_dir:
                  continue

              metadata_path = os.path.join(stack_dir, "stack-metadata.json")
              with open(metadata_path, "r", encoding="utf-8") as metadata_file:
                  metadata = json.load(metadata_file)

              group_dir = os.path.dirname(stack_dir)

              if group_dir not in groups:
                  groups[group_dir] = {
                      "group_dir": group_dir,
                      "provider": metadata["provider"],
                      "region": metadata["region"],
                      "github_environment": metadata["github_environment"],
                      "role_arn": metadata["role_arn"],
                  }

          print(json.dumps(list(groups.values()), separators=(",", ":")))
          ')"

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          printf 'groups=%s\n' "$GROUPS_JSON" >> "$GITHUB_OUTPUT"

  fmt:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install Terragrunt
        uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: ${{ env.TG_VERSION }}
          tf_path: terraform

      - name: Terragrunt HCL fmt
        working-directory: terraform/live
        run: terragrunt hcl fmt --check --diff

      - name: Terraform fmt
        run: terraform fmt -check -recursive

  validate-and-plan:
    if: ((github.event_name == 'pull_request') && needs.detect-stacks.outputs.has_changes == 'true') || github.event_name == 'workflow_dispatch'
    needs:
      - detect-stacks
      - fmt
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: ${{ fromJson(needs.detect-stacks.outputs.groups) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install Terragrunt
        uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: ${{ env.TG_VERSION }}
          tf_path: terraform

      - name: Configure AWS credentials
        if: matrix.group.provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ matrix.group.region }}
          role-to-assume: ${{ matrix.group.role_arn }}
      
      - name: Debug Terragrunt environment
        working-directory: ${{ matrix.group.group_dir }}
        shell: bash
        run: |
          set -x
          pwd
          git rev-parse --show-toplevel
          terragrunt --version
          terraform version
          ls -la
          ls -la ../../../../modules
          for d in alb s3 ecs rds network; do
            echo "=== $d/terragrunt.hcl ==="
            sed -n '1,40p' "$d/terragrunt.hcl" || true
          done

      - name: Terragrunt validate
        working-directory: ${{ matrix.group.group_dir }}
        run: terragrunt run --all --non-interactive validate

      - name: Debug state before apply
        working-directory: ${{ matrix.group.group_dir }}
        shell: bash
        run: |
          set -x
          pwd
          terragrunt run --all --non-interactive state list || true

      - name: Terragrunt plan
        working-directory: ${{ matrix.group.group_dir }}
        run: terragrunt run --all --non-interactive plan

  apply:
    if: ((github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_apply == 'true')) && needs.detect-stacks.outputs.has_changes == 'true'
    needs:
      - detect-stacks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: ${{ fromJson(needs.detect-stacks.outputs.groups) }}
    environment: ${{ matrix.group.github_environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install Terragrunt
        uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: ${{ env.TG_VERSION }}
          tf_path: terraform

      - name: Configure AWS credentials
        if: matrix.group.provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ matrix.group.region }}
          role-to-assume: ${{ matrix.group.role_arn }}
      
      - name: Debug s3 state before apply
        working-directory: terraform/live/aws/prod/ap-east-1/s3
        shell: bash
        run: |
          set -x
          pwd
          aws sts get-caller-identity
          terragrunt init
          rg -n 'bucket|key|region' .terragrunt-cache/**/backend.tf
          terragrunt state list || true

      # - name: Terragrunt apply
      #   working-directory: ${{ matrix.group.group_dir }}
      #   run: terragrunt run --all --non-interactive apply -- -auto-approve -no-color
